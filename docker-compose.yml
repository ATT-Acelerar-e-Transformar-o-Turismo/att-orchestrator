include:
  - ./user-service/docker-compose.yml
  - ./data-collector/docker-compose.yml
  - ./resource-service/docker-compose.yml
  - ./indicator-service/docker-compose.yml
  - ./knowledge-base/docker-compose.yml
  - ./user-interface/docker-compose.yml

services:
  reverse-proxy:
    image: nginx:latest
    container_name: att-reverse-proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - user-interface

  services-mq:
    image: rabbitmq:management
    container_name: att-services-mq
    hostname: services-mq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 8s
      retries: 6
    restart: on-failure
    networks:
      - mq-network

  data-mq:
    image: rabbitmq:management
    container_name: att-data-mq
    hostname: data-mq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 8s
      retries: 6
    restart: on-failure
    networks:
      - mq-network


  keycloak:
    image: quay.io/keycloak/keycloak:26.1.1
    container_name: att-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: info
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    command: ["start-dev", "--http-port", "7080", "--https-port", "7443", "--http-relative-path", "/auth", "--import-realm"]
    ports:
      - "7080:7080"
      - "7443:7443"
    volumes:
      - ./user-service/keycloak/att-realm.json:/opt/keycloak/data/import/att-realm.json

networks:
  mq-network:
    name: mq-network
